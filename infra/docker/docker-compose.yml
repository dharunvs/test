version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: branchline-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: branchline
      POSTGRES_USER: branchline
      POSTGRES_PASSWORD: branchline
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: branchline-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:
