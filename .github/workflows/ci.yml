name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  wedge_checks:
    name: Wedge Checks
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: branchline
        options: >-
          --health-cmd "pg_isready -U postgres -d branchline"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/branchline
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      REDIS_URL: redis://localhost:6379
      AUTH_JWT_SECRET: branchline-ci-auth-secret-0001
      GITHUB_WEBHOOK_SECRET: branchline-ci-webhook-secret
      BRANCHLINE_SMOKE_BEARER_TOKEN: dev-token
      BRANCHLINE_E2E_BEARER_TOKEN: dev-token
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm lint:verify-scripts
      - run: pnpm test:scripts
      - run: pnpm feature-gates:manifest
      - run: pnpm --filter @branchline/api-server prisma:generate
      - run: pnpm --filter @branchline/api-server exec prisma validate
      - run: pnpm --filter @branchline/api-server exec prisma migrate deploy
      - run: pnpm --filter @branchline/api-server exec prisma migrate status
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm --filter @branchline/api-server build
      - run: pnpm --filter @branchline/web-console build
      - run: pnpm --filter @branchline/worker build
      - run: pnpm --filter branchline-vscode-extension build

  e2e_web:
    name: Wedge Web E2E
    runs-on: ubuntu-latest
    needs: wedge_checks
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')) || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter @branchline/web-console exec playwright install chromium
      - run: pnpm e2e:web

  e2e_extension:
    name: Wedge Extension E2E
    runs-on: ubuntu-latest
    needs: wedge_checks
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')) || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: sudo apt-get update && sudo apt-get install -y xvfb
      - run: xvfb-run -a pnpm e2e:extension
